<body>

<!-- SKY -->

<div
    id="sky"
    class="scene"
    can-play>

</div>


<!-- COLOR PICKER -->

<div id="color-picker" can-play>

    <label>

        ✨ My Star Color

        <input
            type="color"
            value="#7dd3fc">

    </label>

</div>


<!-- GUESTBOOK -->

<div
    id="guestbook"
    can-play
    can-hover>
</div>


<!-- CLEAR BUTTON -->

<button id="clearSky">

    Clear the Sky

</button>


<script type="module">

import {

    html,
    repeat,
    playhtml

} from "https://unpkg.com/playhtml@latest";

await playhtml.init({

    cursors: {

        enabled: true,
        room: "page"

    }

});


/*************************************************
 COLOR PICKER
**************************************************/

const picker = document.getElementById("color-picker");

picker.myDefaultAwareness = "#7dd3fc";

picker.querySelector("input")
.addEventListener("input", e => {

    picker.myAwareness = e.target.value;

});


/*************************************************
 GUESTBOOK
**************************************************/
 const isAdmin = () =>
    new URLSearchParams(location.search).has('admin') ||
    sessionStorage.getItem('admin') === '1';

  const unlock = () => sessionStorage.setItem('admin', '1');

  // Simpler than Konami: Cmd/Ctrl + Shift + A
  window.addEventListener('keydown', (event) => {
    if (
      (event.metaKey || event.ctrlKey) &&
      event.shiftKey &&
      event.key === 'a'
    ) {
      event.preventDefault();
      unlock();
      playhtml.getHandle('guestbook').requestUpdate();
    }
  });

  playhtml.register('guestbook', {
    defaultData: { entries: [], frozen: false },
    view: ({ data, setData }) => {
      const admin = isAdmin();
      const frozen = Boolean(data.frozen);

      const wish = (event) => {
        event.preventDefault();
        if (frozen) return;
        const input = event.target.querySelector('input');
        const message = input.value.trim();
        if (!message) return;
        setData((draft) => {
          draft.entries.push({
            name: window.cursors?.name || 'someone',
            message,
            at: Date.now(),
          });
        });
        input.value = '';
      };

      const remove = (at) => {
        if (!admin) return;
        setData((draft) => {
          const i = draft.entries.findIndex((e) => e.at === at);
          if (i >= 0) draft.entries.splice(i, 1);
        });
      };
       function clear() {

            setData(draft => {

                draft.entries = [];

            });

        }

      return html`
        ${admin ? html`<div class="admin-bar">admin unlocked</div>` : null}
        ${frozen ? html`<p>signing is frozen — closed for now</p>` : null}
        <form @submit=${wish}>
          <input
            placeholder=${frozen ? 'wishing frozen…' : 'written in the stars...'}
            ?disabled=${frozen}
          />
          <button type="submit" ?disabled=${frozen}>wish</button>
        </form>
        <ul>
          ${repeat(
            [...data.entries].reverse(),
            (entry) => html`
              <li>
                <b>${entry.name}</b>: ${entry.message}
                ${admin
                  ? html`<button type="button" @click=${() => remove(entry.at)}>
                      delete
                    </button>`
                  : null}
              </li>
            `,
          )}
        </ul>
      `;
    },
  });
