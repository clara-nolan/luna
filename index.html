<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Luna</title>

<link rel="stylesheet" href="main-style.css">
</head>

<body>

<!-- SKY -->

<div
    id="sky"
    class="scene"
    can-play>

</div>


<!-- COLOR PICKER -->

<div id="color-picker" can-play>

    <label>

        ✨ My Star Color

        <input
            type="color"
            value="#7dd3fc">

    </label>

</div>


<!-- GUESTBOOK -->

<div
    id="guestbook"
    can-play
    can-hover>
</div>


<!-- CLEAR BUTTON -->

<button id="clearSky">

    Clear the Sky

</button>


<script type="module">

import {

    html,
    repeat,
    playhtml

} from "https://unpkg.com/playhtml@latest";

await playhtml.init({

    cursors: {

        enabled: true,
        room: "page"

    }

});


/*************************************************
 COLOR PICKER
**************************************************/

const picker = document.getElementById("color-picker");

picker.myDefaultAwareness = "#7dd3fc";

picker.querySelector("input")
.addEventListener("input", e => {

    picker.myAwareness = e.target.value;

});


/*************************************************
 GUESTBOOK
**************************************************/

playhtml.register("guestbook", {

    defaultData: {

        entries: []

    },

    view: ({ data, setData }) => {

        function sign(event) {

            event.preventDefault();

            const input =
                event.target.querySelector("input");

            const message =
                input.value.trim();

            if (!message) return;

            setData(draft => {

                draft.entries.push({

                    name:
                        window.cursors?.name ??
                        "someone",

                    message,

                    at: Date.now()

                });

            });

            input.value = "";

        }

        function clear() {

            setData(draft => {

                draft.entries = [];

            });

        }

        return html`

            <p>

                ${data.entries.length}
                wishes in the sky ✨

            </p>

            <form @submit=${sign}>

                <input
                    placeholder="it's written in the stars..."
                >

                <button>

                    Make a Wish

                </button>

            </form>

            <button
                @click=${clear}
                ?disabled=${!data.entries.length}
            >

                Clear Wishes

            </button>

            <ul>

                ${repeat(

                    [...data.entries].reverse(),

                    wish => html`

                        <li>

                            <b>

                                ${wish.name}

                            </b>

                            ${wish.message}

                        </li>

                    `

                )}

            </ul>

        `;

    }

});


window.playhtml = playhtml;

import("./main.js");

</script>

</body>
</html>
